name: Build Windows EXE

on:
  workflow_dispatch:      # cho phép bấm "Run workflow" thủ công trên GitHub
  push:
    branches: [ main ]     # tự chạy mỗi khi push lên nhánh main
    tags:
      - 'v*'                # push tag dạng v1.0.0 sẽ tự tạo Release kèm file exe

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build EXE (electron-builder)
        run: npm run dist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact (tải về từ tab Actions)
        uses: actions/upload-artifact@v4
        with:
          name: VLTK8-Windows-EXE
          path: |
            dist/*.exe

      - name: Create GitHub Release (chỉ khi push tag v*)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
