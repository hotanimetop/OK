name: TRR to M3U8 (Smart Encode)

on:
  workflow_dispatch:
    inputs:
      link:
        description: 'Link'
        required: true
      slug:
        description: 'Slug'
        required: true
      token:
        description: 'Token'
        required: true
      page:
        description: 'Pages'
        required: true
      account:
        description: 'Account'
        required: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg aria2

      ############################################################
      # DOWNLOAD VIA TORRENT
      ############################################################
      - name: Download via Torrent
        run: |
          LINK="${{ github.event.inputs.link }}"
          mkdir -p torrent_download

          echo "==========================================="
          echo "DOWNLOADING: $LINK"
          echo "==========================================="

          aria2c \
            --seed-time=0 \
            --max-download-limit=0 \
            --file-allocation=none \
            --dir=torrent_download \
            "$LINK"

          # Tìm file video lớn nhất
          VIDEO_FILE=$(find torrent_download -type f \( \
            -iname "*.mkv" -o -iname "*.mp4" -o -iname "*.avi" -o \
            -iname "*.mov" -o -iname "*.ts" -o -iname "*.m2ts" \
          \) -printf "%s\t%p\n" | sort -rn | head -n1 | cut -f2-)

          if [ -z "$VIDEO_FILE" ]; then
            echo "ERROR: Không tìm thấy file video!"
            exit 1
          fi

          cp "$VIDEO_FILE" input_video_raw.mkv
          echo "DOWNLOAD COMPLETED: $VIDEO_FILE"

      ############################################################
      # SMART PROCESSING (ENCODE OR DIRECT USE)
      ############################################################
      - name: Process Video
        run: |
          LINK="${{ github.event.inputs.link }}"
          INPUT="input_video_raw.mkv"
          OUTPUT="final_source.mp4"

          # KIỂM TRA ĐIỀU KIỆN LINK
          if [[ "$LINK" == *".torrent" ]]; then
            echo "==========================================="
            echo "LINK DẠNG .TORRENT -> BỎ QUA ENCODE (COPY STREAM)"
            echo "==========================================="
            # Chỉ chuyển container sang MP4 (không render lại) để làm HLS dễ hơn
            ffmpeg -y -i "$INPUT" -c copy -movflags +faststart "$OUTPUT"
          else
            echo "==========================================="
            echo "LINK DẠNG VIEW -> BẮT ĐẦU ENCODE H264"
            echo "==========================================="
            ffmpeg -y -stats_period 30 -i "$INPUT" \
              -c:v libx264 -pix_fmt yuv420p -profile:v high -level 4.1 \
              -crf 25 -preset medium -maxrate 2500k -bufsize 3500k \
              -vf "scale=trunc(iw/2)*2:trunc(ih/2)*2" \
              -c:a aac -b:a 96k -ac 2 -ar 48000 \
              -movflags +faststart "$OUTPUT"
          fi

      ############################################################
      # EXTRACT & UPLOAD SUBTITLES
      ############################################################
      - name: Handle Subtitles
        run: |
          SLUG="${{ github.event.inputs.slug }}"
          mkdir -p subs
          
          # Trích xuất sub (dùng file raw để đảm bảo còn nguyên stream sub)
          ffmpeg -y -i input_video_raw.mkv -map 0:s:m:language:eng -c:s webvtt "subs/${SLUG}-en.vtt" || true
          
          # Hàm upload
          upload_sub () {
            if [ -f "$1" ]; then
              curl -X POST -A "MySecretAgent_ViCDN_cc" https://vicdn.cc/sub.php -F "filename=$(basename $1)" -F "file=@$1"
            fi
          }
          upload_sub "subs/${SLUG}-en.vtt"

      ############################################################
      # CONVERT TO HLS fMP4
      ############################################################
      - name: Convert to HLS fMP4
        run: |
          mkdir -p output
          SLUG="${{ github.event.inputs.slug }}"
          
          ffmpeg -y -i "final_source.mp4" \
            -map 0:v:0 -map 0:a? \
            -c:v copy -c:a copy \
            -f hls \
            -start_number 10001 \
            -hls_time 5 \
            -hls_list_size 0 \
            -hls_flags independent_segments \
            -hls_segment_type fmp4 \
            -hls_fmp4_init_filename "${SLUG}-index.png" \
            -hls_segment_filename "output/${SLUG}-index%d.png" \
            "output/${SLUG}.m3u8"

          ls -lh output/

      ############################################################
      # UPLOAD SUBTITLE TO SERVER
      ############################################################
      - name: Upload subtitles
        run: |
          SLUG="${{ github.event.inputs.slug }}"

          upload_sub () {
            FILE=$1
            if [ -f "$FILE" ]; then
              echo "Uploading $FILE"
              curl -X POST -A "MySecretAgent_ViCDN_cc" https://vicdn.cc/sub.php \
                -F "filename=$(basename $FILE)" \
                -F "file=@$FILE"
            else
              echo "Subtitle $FILE not found"
            fi
          }

          upload_sub "subs/${SLUG}-vi.vtt"
          upload_sub "subs/${SLUG}-en.vtt"
          upload_sub "subs/${SLUG}-jp.vtt"

      ############################################################
      # ENCODE H264 (bắt buộc, tối ưu dung lượng)
      ############################################################
      - name: Encode to H264
        run: |
          INPUT_FILE="input_video.mkv"
          FINAL_INPUT="processed_video.mp4"

          echo "==========================================="
          echo "THÔNG TIN VIDEO GỐC:"
          ffprobe -v error \
            -show_entries stream=codec_name,width,height,bit_rate \
            -of default=noprint_wrappers=1 "$INPUT_FILE" || true
          echo "==========================================="
          echo "BẮT ĐẦU ENCODE H264 (tối ưu dung lượng)..."
          echo "==========================================="

          ffmpeg -y -stats_period 30 -i "$INPUT_FILE" \
            -c:v libx264 \
            -pix_fmt yuv420p \
            -profile:v high \
            -level 4.1 \
            -crf 25 \
            -preset medium \
            -maxrate 2500k \
            -bufsize 3500k \
            -vf "scale=trunc(iw/2)*2:trunc(ih/2)*2,unsharp=3:3:0.6:3:3:0.3" \
            -force_key_frames "expr:gte(t,n_forced*10)" \
            -sc_threshold 0 \
            -c:a aac \
            -b:a 96k \
            -ac 2 \
            -ar 48000 \
            -threads 0 \
            -movflags +faststart \
            "$FINAL_INPUT"

          echo "==========================================="
          echo "ENCODE HOÀN TẤT"
          echo "Dung lượng gốc:   $(du -sh "$INPUT_FILE" | cut -f1)"
          echo "Dung lượng mới:   $(du -sh "$FINAL_INPUT" | cut -f1)"
          echo "==========================================="

      ############################################################
      # PHÂN ĐOẠN HLS fMP4
      ############################################################
      - name: Convert to HLS fMP4
        run: |
          mkdir -p output
          SLUG="${{ github.event.inputs.slug }}"
          FINAL_INPUT="processed_video.mp4"

          echo "==========================================="
          echo "TIẾN HÀNH PHÂN ĐOẠN HLS fMP4"
          echo "==========================================="

          ffmpeg -y -stats_period 30 -i "$FINAL_INPUT" \
            -map 0:v:0 -map 0:a? \
            -c:v copy \
            -c:a copy \
            -f hls \
            -start_number 10001 \
            -hls_time 5 \
            -hls_list_size 0 \
            -hls_flags independent_segments \
            -hls_segment_type fmp4 \
            -hls_fmp4_init_filename "${SLUG}-index.png" \
            -hls_segment_filename "output/${SLUG}-index%d.png" \
            "output/${SLUG}.m3u8"

          if [ ! -f "output/${SLUG}.m3u8" ]; then
            echo "FFmpeg failed to create m3u8"
            exit 1
          fi

          echo "==========================================="
          echo "CHUYỂN ĐỔI HOÀN TẤT"
          ls -lh output/
          echo "==========================================="

      ############################################################
      # DEPLOY TO CLOUDFLARE PAGES
      ############################################################
      - name: Deploy to Cloudflare Pages (first)
        id: deploy1
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ github.event.inputs.token }}
          accountId: ${{ github.event.inputs.account }}
          projectName: ${{ github.event.inputs.page }}
          directory: ./output
          branch: ${{ github.event.inputs.slug }}

      - name: Verify Cloudflare deployment (branch domain check)
        id: verify
        continue-on-error: true
        env:
          PROJECT: ${{ github.event.inputs.page }}
          BRANCH: ${{ github.event.inputs.slug }}
        run: |
          set -e
          FILE_URL="https://${{ github.event.inputs.slug }}.${{ github.event.inputs.page }}.pages.dev/${{ github.event.inputs.slug }}.m3u8"

          echo "[TARGET] $FILE_URL"

          check () {
            code=$(curl -L -o /dev/null -s -w "%{http_code}" "$FILE_URL")
            echo "HTTP CODE: $code"
            [ "$code" = "200" ]
          }

          echo "[WAIT] Waiting 1 minute for Pages propagation..."
          sleep 60

          echo "[CHECK #1]"
          if check; then
            echo "[SUCCESS] File exists"
            curl -G "https://cp.ssplay.net/vicdn.php" \
              --data-urlencode "type=ok0" \
              --data-urlencode "key=${{ github.event.inputs.page }}" \
              --data-urlencode "slug=${{ github.event.inputs.slug }}"
            curl -L -A "MySecretAgent_ViCDN_cc" "https://vicdn.cc/${{ github.event.inputs.slug }}?r=1"
            exit 0
          fi

          echo "[WAIT] Still not found, wait extra 3 minutes..."
          sleep 180

          echo "[CHECK #2]"
          if check; then
            echo "[SUCCESS] File exists after delay"
            exit 0
          fi

          echo "[FAIL] File still missing → mark for redeploy"
          echo "NEED_REDEPLOY=true" >> $GITHUB_ENV
          exit 1

      - name: Deploy to Cloudflare Pages (retry)
        if: env.NEED_REDEPLOY == 'true'
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ github.event.inputs.token }}
          accountId: ${{ github.event.inputs.account }}
          projectName: ${{ github.event.inputs.page }}
          directory: ./output
          branch: ${{ github.event.inputs.slug }}
