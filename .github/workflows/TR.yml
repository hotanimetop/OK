name: TRR to M3U8 (Smart Fixed)

on:
  workflow_dispatch:
    inputs:
      link:
        description: 'Link Nyaa (Dán link /view/ để Encode, link .torrent để Skip)'
        required: true
      slug:
        description: 'Slug'
        required: true
      token:
        description: 'Token'
        required: true
      page:
        description: 'Pages'
        required: true
      account:
        description: 'Account'
        required: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg aria2

      ############################################################
      # DOWNLOAD & FIX LINK
      ############################################################
      - name: Download via Torrent
        run: |
          RAW_LINK="${{ github.event.inputs.link }}"
          
          # Tự động sửa link Nyaa nếu người dùng dán link /view/
          if [[ "$RAW_LINK" == *"nyaa.si/view/"* ]]; then
            DOWNLOAD_URL=$(echo "$RAW_LINK" | sed 's|nyaa.si/view/|nyaa.si/download/|' | sed 's|.torrent$||').torrent
          else
            DOWNLOAD_URL="$RAW_LINK"
          fi

          mkdir -p torrent_download
          echo "Downloading from: $DOWNLOAD_URL"

          aria2c --seed-time=0 --max-download-limit=0 --user-agent="Mozilla/5.0" \
                 --file-allocation=none --dir=torrent_download "$DOWNLOAD_URL"

          # Tìm file video lớn nhất
          VIDEO_PATH=$(find torrent_download -type f \( -iname "*.mkv" -o -iname "*.mp4" -o -iname "*.avi" -o -iname "*.mov" -o -iname "*.ts" -o -iname "*.m2ts" \) -printf "%s\t%p\n" | sort -rn | head -n1 | cut -f2-)

          if [ -z "$VIDEO_PATH" ]; then
            echo "ERROR: Không tìm thấy video!"; exit 1
          fi

          # Copy ra file cố định để các bước sau sử dụng
          cp "$VIDEO_PATH" "input_origin.mkv"
          echo "File chuẩn bị xử lý: input_origin.mkv"

      ############################################################
      # SMART PROCESSING (Logic phân biệt Encode hay không)
      ############################################################
      - name: Process Video
        run: |
          LINK="${{ github.event.inputs.link }}"
          INPUT="input_origin.mkv"
          PROCESSED="ready_to_hls.mp4"

          # Nếu link kết thúc bằng .torrent (dù là link view hay download) thì SKIP ENCODE
          if [[ "$LINK" == *".torrent" ]]; then
            echo ">>> CHẾ ĐỘ: KHÔNG ENCODE (COPY STREAM) <<<"
            ffmpeg -y -i "$INPUT" -c copy -movflags +faststart "$PROCESSED"
          else
            echo ">>> CHẾ ĐỘ: ENCODE H264 TỐI ƯU <<<"
            ffmpeg -y -stats_period 30 -i "$INPUT" \
              -c:v libx264 -pix_fmt yuv420p -profile:v high -level 4.1 \
              -crf 25 -preset medium -maxrate 2500k -bufsize 3500k \
              -vf "scale=trunc(iw/2)*2:trunc(ih/2)*2,unsharp=3:3:0.6:3:3:0.3" \
              -c:a aac -b:a 96k -ac 2 -ar 48000 \
              -movflags +faststart "$PROCESSED"
          fi

      ############################################################
      # SUBTITLES & HLS
      ############################################################
      - name: Handle Subtitles and HLS
        run: |
          SLUG="${{ github.event.inputs.slug }}"
          mkdir -p output subs

          # 1. Trích xuất Sub từ file gốc
          ffmpeg -y -i input_origin.mkv -map 0:s:m:language:vie -c:s webvtt "subs/${SLUG}-vi.vtt" || true
          ffmpeg -y -i input_origin.mkv -map 0:s:m:language:eng -c:s webvtt "subs/${SLUG}-en.vtt" || true

          # 2. Upload Sub
          upload_sub () {
            if [ -f "$1" ]; then
              curl -X POST -A "MySecretAgent_ViCDN_cc" https://vicdn.cc/sub.php -F "filename=$(basename $1)" -F "file=@$1"
            fi
          }
          upload_sub "subs/${SLUG}-vi.vtt"
          upload_sub "subs/${SLUG}-en.vtt"

          # 3. Phân đoạn HLS từ file đã qua bước Process
          ffmpeg -y -i "ready_to_hls.mp4" \
            -map 0:v:0 -map 0:a? -c:v copy -c:a copy -f hls \
            -start_number 10001 -hls_time 5 -hls_list_size 0 \
            -hls_flags independent_segments -hls_segment_type fmp4 \
            -hls_fmp4_init_filename "${SLUG}-index.png" \
            -hls_segment_filename "output/${SLUG}-index%d.png" \
            "output/${SLUG}.m3u8"

      ############################################################
      # DEPLOY TO CLOUDFLARE PAGES
      ############################################################
      - name: Deploy to Cloudflare Pages (first)
        id: deploy1
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ github.event.inputs.token }}
          accountId: ${{ github.event.inputs.account }}
          projectName: ${{ github.event.inputs.page }}
          directory: ./output
          branch: ${{ github.event.inputs.slug }}

      - name: Verify Cloudflare deployment (branch domain check)
        id: verify
        continue-on-error: true
        env:
          PROJECT: ${{ github.event.inputs.page }}
          BRANCH: ${{ github.event.inputs.slug }}
        run: |
          set -e
          FILE_URL="https://${{ github.event.inputs.slug }}.${{ github.event.inputs.page }}.pages.dev/${{ github.event.inputs.slug }}.m3u8"

          echo "[TARGET] $FILE_URL"

          check () {
            code=$(curl -L -o /dev/null -s -w "%{http_code}" "$FILE_URL")
            echo "HTTP CODE: $code"
            [ "$code" = "200" ]
          }

          echo "[WAIT] Waiting 1 minute for Pages propagation..."
          sleep 60

          echo "[CHECK #1]"
          if check; then
            echo "[SUCCESS] File exists"
            curl -G "https://cp.ssplay.net/vicdn.php" \
              --data-urlencode "type=ok0" \
              --data-urlencode "key=${{ github.event.inputs.page }}" \
              --data-urlencode "slug=${{ github.event.inputs.slug }}"
            curl -L -A "MySecretAgent_ViCDN_cc" "https://vicdn.cc/${{ github.event.inputs.slug }}?r=1"
            exit 0
          fi

          echo "[WAIT] Still not found, wait extra 3 minutes..."
          sleep 180

          echo "[CHECK #2]"
          if check; then
            echo "[SUCCESS] File exists after delay"
            exit 0
          fi

          echo "[FAIL] File still missing → mark for redeploy"
          echo "NEED_REDEPLOY=true" >> $GITHUB_ENV
          exit 1

      - name: Deploy to Cloudflare Pages (retry)
        if: env.NEED_REDEPLOY == 'true'
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ github.event.inputs.token }}
          accountId: ${{ github.event.inputs.account }}
          projectName: ${{ github.event.inputs.page }}
          directory: ./output
          branch: ${{ github.event.inputs.slug }}
